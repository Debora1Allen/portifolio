<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dead Alien - Contato</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/portifolio/assets/contato-BmBFpn5Y.js"></script>
    <link rel="modulepreload" crossorigin href="/portifolio/assets/global-C_wFhKoF.js">
    <link rel="stylesheet" crossorigin href="/portifolio/assets/global-Doy1O83m.css">
    <link rel="stylesheet" crossorigin href="/portifolio/assets/contato-BYtAxcLM.css">
    <link rel="stylesheet" crossorigin href="/portifolio/assets/style-DYP2F_fI.css">
  </head>
  <body>
    <div class="container">
      <form
        action="https://formspree.io/f/xzdqagza"
        method="POST"
        class="contact-form"
      >
        <div class="input-group">
          <label for="name">NOME</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Ex: Corvo"
          />
        </div>

        <div class="input-group">
          <label for="email">EMAIL</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="allanpoe@email.com"
          />
        </div>

        <div class="input-group">
          <label for="message">MENSAGEM</label>
          <textarea
            id="message"
            name="message"
            rows="4"
            required
            placeholder="Escreva"
          ></textarea>
        </div>

        <button type="submit" class="link-btn submit-btn">
          Enviar Mensagem
        </button>
      </form>

      <hr class="divider" />
      <a href="../index.html" class="link-btn back-btn"
        >← Voltar para o Início</a
      >
    </div>
  </body>
</html>
